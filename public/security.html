<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security — RegistryView</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div id="dev-banner" class="dev-banner">&#9888; Development</div>
    <nav id="main-nav"></nav>

    <main>
        <div class="page-header">
            <div>
                <h1>Security</h1>
                <p>Manage two-factor authentication and access settings</p>
            </div>
        </div>

        <!-- 2FA card (loaded dynamically) -->
        <div id="security-2fa"><p class="loading"><span class="spinner"></span> Loading…</p></div>

        <!-- 2FA setup modal -->
        <div id="twoFaModal" class="twofa-modal" style="display:none" role="dialog" aria-modal="true" aria-label="Two-factor authentication setup">
            <div class="twofa-setup-card">
                <button class="twofa-close-btn" id="twoFaClose" aria-label="Close">&times;</button>
                <div class="twofa-header">
                    <h2>Set up two-factor authentication</h2>
                    <p>Scan the QR code with your authenticator app, then verify it's working.</p>
                </div>
                <div id="twoFaContent"></div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/security.js"></script>
</body>
</html>
