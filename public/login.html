<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — RegistryView</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
    <div id="dev-banner" class="dev-banner">&#9888; Development</div>
    <div class="login-card">
        <div class="login-brand">
            <img src="/images/logo.svg" alt="" width="36" height="36">
            <div class="login-title"><span class="nav-brand-registry">Registry</span><span class="nav-brand-view">View</span></div>
        </div>
        <div class="login-sub" id="loginHeading">Sign in with your RegistryView credentials to access your registries</div>

        <div id="alert-area"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign in</button>
        </form>

        <form id="totpForm" class="hidden">
            <div class="form-group">
                <label for="totpCode">Authenticator Code</label>
                <input type="text" id="totpCode" name="totpCode" inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="one-time-code" placeholder="000000" class="totp-input">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="totpBtn">Verify</button>
            <p class="totp-hint">Enter the 6-digit code from your authenticator app</p>
        </form>
    </div>
    <script src="/js/login.js"></script>
</body>
</html>
