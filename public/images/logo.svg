<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Back container layer -->
  <rect x="8" y="6" width="26" height="18" rx="3" fill="#0a4a7a" stroke="#1a6fb5" stroke-width="1.2"/>
  <!-- Mid container layer -->
  <rect x="5" y="10" width="26" height="18" rx="3" fill="#0d5a96" stroke="#1e82d4" stroke-width="1.2"/>
  <!-- Front container layer -->
  <rect x="2" y="14" width="26" height="18" rx="3" fill="#1168b0" stroke="#2196f3" stroke-width="1.5"/>
  <!-- Front container grip lines -->
  <line x1="7" y1="20" x2="23" y2="20" stroke="#2196f3" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="7" y1="24" x2="19" y2="24" stroke="#2196f3" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <!-- Tag badge on front container -->
  <rect x="18" y="16.5" width="8" height="5" rx="1.5" fill="#2196f3" opacity="0.9"/>
  <rect x="19.5" y="18" width="5" height="1.5" rx="0.5" fill="#fff" opacity="0.9"/>
  <!-- Upload arrow -->
  <path d="M33 22 L33 12" stroke="#2196f3" stroke-width="2" stroke-linecap="round"/>
  <path d="M29.5 15.5 L33 12 L36.5 15.5" stroke="#2196f3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
